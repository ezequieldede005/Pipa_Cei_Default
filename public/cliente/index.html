<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pipa Ceilândia — Cardápio</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/cliente.css">
<link rel="icon" type="image/png" href="/logo/logo.png">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <!-- Logo + nome sempre juntos -->
    <div class="marca">
      <div class="marca-lockup" id="marcaLockup">
        <img id="logoImg" class="logo" src="" alt="" style="display:none">
        <div class="marca-texto">
          <span class="marca-nome">PIPA<em>CEILÂNDIA</em></span>
          <span class="marca-sub">peça aqui • pague na retirada</span>
        </div>
      </div>
    </div>
    <button class="btn-carrinho" id="btnCarrinho">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="badge" id="badge" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- Banner de promoções em grupo -->
<div id="bannerPromoGrupo" style="display:none"></div>

<nav class="nav-cats" id="navCats"></nav>

<main class="main" id="main">
  <div class="loading">Carregando cardápio...</div>
</main>

<!-- Barra flutuante do carrinho -->
<div class="barra-carrinho hidden" id="barraCarrinho">
  <span class="barra-left">
    <span class="barra-badge" id="barraBadge">0</span>
    Ver pedido
  </span>
  <span id="barraTotal">R$ 0,00</span>
</div>

<!-- Modal carrinho -->
<div class="overlay hidden" id="overlayCarrinho">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="titleModal">Seu pedido</h2>
      <button class="btn-close" id="btnFechar">✕</button>
    </div>
    <div id="listaCarrinho"></div>
    <div id="formArea" style="display:none">
      <!-- Dica promoção grupo no carrinho -->
      <div id="dicaPromoGrupo" style="display:none"></div>
      <div class="total-row">
        <span>Total</span><span class="total-val" id="totalVal">R$ 0,00</span>
      </div>
      <div class="campo"><label>Seu nome *</label>
        <input id="fNome" type="text" placeholder="Como chamar você no balcão?"></div>
      <div class="campo"><label>WhatsApp (opcional)</label>
        <input id="fFone" type="tel" placeholder="(61) 9 ...."></div>
      <div class="campo"><label>Observação</label>
        <textarea id="fObs" placeholder="Sem gelo, trocar limão..."></textarea></div>
      <button class="btn-primary" id="btnEnviar">Confirmar — pagar na retirada</button>
    </div>
  </div>
</div>

<!-- Modal sucesso -->
<div class="overlay hidden" id="overlaySucesso">
  <div class="sheet" style="text-align:center;padding:40px 20px">
    <div class="check-circle">✓</div>
    <h2>Pedido enviado!</h2>
    <p style="color:var(--muted)">Aguarde ser chamado pelo nome no balcão.<br>Pagamento na retirada.</p>
    <div class="num-pedido" id="numPedido">#001</div>
    <button class="btn-primary" style="margin-top:20px" id="btnNovo">Fazer novo pedido</button>
  </div>
</div>

<script src="/js/cliente.js"></script>
</body>
</html>
